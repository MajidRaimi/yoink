name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile

      - name: Verify tag matches CLI version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./apps/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG does not match apps/cli/package.json $PKG"
            exit 1
          fi

      - name: Build binaries
        run: bun run apps/cli/scripts/build-binaries.ts

      - name: Smoke test
        run: |
          chmod +x apps/cli/dist/yoink-darwin-arm64
          OUTPUT="$(apps/cli/dist/yoink-darwin-arm64 version)"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            apps/cli/dist/yoink-darwin-arm64 \
            apps/cli/dist/yoink-darwin-x64 \
            apps/cli/dist/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run apps/cli/scripts/publish-npm.ts
