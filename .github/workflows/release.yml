name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Verify tag matches CLI version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./apps/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG does not match apps/cli/package.json $PKG"
            exit 1
          fi

      - name: Build binaries
        run: bun run apps/cli/scripts/build-binaries.ts

      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist

  smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            asset: yoink-darwin-arm64.tar.gz
            binary: yoink
            shell: bash
          - runner: macos-15-intel
            asset: yoink-darwin-x64.tar.gz
            binary: yoink
            shell: bash
          - runner: ubuntu-latest
            asset: yoink-linux-x64.tar.gz
            binary: yoink
            shell: bash
          - runner: ubuntu-24.04-arm
            asset: yoink-linux-arm64.tar.gz
            binary: yoink
            shell: bash
          - runner: windows-latest
            asset: yoink-windows-x64.zip
            binary: yoink.exe
            shell: pwsh
          - runner: windows-11-arm
            asset: yoink-windows-arm64.zip
            binary: yoink.exe
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist

      - name: Smoke test
        if: matrix.shell == 'bash'
        run: |
          tar -xzf "dist/${{ matrix.asset }}" -C dist
          chmod +x "dist/${{ matrix.binary }}"
          EXPECTED="$(node -p "require('./apps/cli/package.json').version")"
          ACTUAL="$(./dist/${{ matrix.binary }} version)"
          echo "expected: $EXPECTED"
          echo "actual: $ACTUAL"
          echo "$ACTUAL" | grep -qF "$EXPECTED"

      - name: Smoke test
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          Expand-Archive -Path "dist/${{ matrix.asset }}" -DestinationPath dist -Force
          $expected = node -p "require('./apps/cli/package.json').version"
          $actual = (& "dist/${{ matrix.binary }}" version) -join "`n"
          Write-Host "expected: $expected"
          Write-Host "actual: $actual"
          if ($actual -notmatch [regex]::Escape($expected)) { exit 1 }

  smoke-musl:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: yoink-linux-x64-musl.tar.gz
          - runner: ubuntu-24.04-arm
            asset: yoink-linux-arm64-musl.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist

      - name: Smoke test (musl via Alpine)
        run: |
          tar -xzf "dist/${{ matrix.asset }}" -C dist
          chmod +x dist/yoink
          EXPECTED="$(node -p "require('./apps/cli/package.json').version")"
          ACTUAL="$(docker run --rm -v "$PWD/dist:/w" alpine:3.20 /w/yoink version)"
          echo "expected: $EXPECTED"
          echo "actual: $ACTUAL"
          echo "$ACTUAL" | grep -qF "$EXPECTED"

  release:
    runs-on: ubuntu-latest
    needs: [smoke, smoke-musl]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS="apps/cli/dist/yoink-*.tar.gz apps/cli/dist/yoink-*.zip apps/cli/dist/checksums.txt"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" $ASSETS --clobber
          else
            gh release create "$GITHUB_REF_NAME" $ASSETS --title "$GITHUB_REF_NAME" --generate-notes
          fi

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run apps/cli/scripts/publish-npm.ts
